    let audioCtx = null;
    let audioBuffer = null;

    async function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const binary = atob(mp3Base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
    }

    async function playSound() {
      await initAudio();
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;

      // GainNode на максимум — усиливаем в 3x сверх обычного
      const gainNode = audioCtx.createGain();
      gainNode.gain.value = 3.0;

      source.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      source.start(0);
    }

    const events = ['mousemove', 'mousedown', 'touchstart', 'touchmove', 'keydown', 'click'];
    function unlock() { playSound(); events.forEach(e => document.removeEventListener(e, unlock)); }
    events.forEach(e => document.addEventListener(e, unlock));

    function onCharClick(e) {
      e.stopPropagation();
      playSound();
      char.classList.add('squish');
      setTimeout(() => char.classList.remove('squish'), 200);
    }
    char.addEventListener('click', onCharClick);
    char.addEventListener('touchstart', (e) => { e.preventDefault(); onCharClick(e); });
  </script>
</body>
</html>
