  <script>
    const music = document.getElementById('music');
    const char = document.getElementById('char');
    music.volume = 1.0;

    function blast() {
      music.volume = 1.0;
      music.play();
    }

    blast();

    const events = ['mousemove', 'mousedown', 'touchstart', 'touchmove', 'keydown', 'scroll', 'click'];
    function unlock() { blast(); events.forEach(e => document.removeEventListener(e, unlock)); }
    events.forEach(e => document.addEventListener(e, unlock));

    function onCharClick(e) {
      e.stopPropagation();
      music.currentTime = 0;
      music.volume = 1.0;
      music.play();
      char.classList.add('squish');
      setTimeout(() => char.classList.remove('squish'), 200);
    }

    char.addEventListener('click', onCharClick);
    char.addEventListener('touchstart', (e) => { e.preventDefault(); onCharClick(e); });
  </script>
